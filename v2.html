function _snapDate(d){ // find nearest available date from _allDates
  if(!window._allDates||!d) return d;
  return window._allDates.reduce((best,cur)=>Math.abs(new Date(cur)-new Date(d))<Math.abs(new Date(best)-new Date(d))?cur:best, window._allDates[0]);
}
function _compFormHtml(){
  const comp=S.comp;
  const minD=(window._allDates&&window._allDates.length)?window._allDates[window._allDates.length-1]:'';
  const maxD=(window._allDates&&window._allDates.length)?window._allDates[0]:'';
  const valA=comp.dateA||window._allDates?.[1]||'';
  const valB=comp.dateB||window._allDates?.[0]||'';
  const uc=S.compUnit;
  return `<div class="mob-comp-form">
    <div class="mob-comp-date-row">
      <div class="mob-comp-date-group">
        <div class="mob-comp-lbl">Desde</div>
        <input type="date" id="mcompA" class="mob-comp-datepick" min="${minD}" max="${maxD}" value="${valA}">
      </div>
      <div class="mob-comp-date-group">
        <div class="mob-comp-lbl">Hasta</div>
        <input type="date" id="mcompB" class="mob-comp-datepick" min="${minD}" max="${maxD}" value="${valB}">
      </div>
    </div>
    <div class="mob-comp-actions">
      <button class="mob-comp-quick" onclick="compQuick('prev')">← Anterior</button>
      <button class="mob-comp-quick" onclick="compQuick('oldest')">← Más antigua</button>
      <button class="mob-comp-go" onclick="runCompararMob()">Ver →</button>
    </div>
    <div class="mob-comp-unit">
      <button class="${uc==='clp'?'on':''}" onclick="setCompUnit('clp')">CLP MM</button>
      <button class="${uc==='usd'?'on':''}" onclick="setCompUnit('usd')">USD M</button>
      <button class="${uc==='uf'?'on':''}" onclick="setCompUnit('uf')">UF</button>
    </div>
  </div>`;
}

function renderCompararMob(){
  if(!window._allDates||window._allDates.length<2){
    document.getElementById('tw').innerHTML=`<div class="sb"><div class="spin"></div><div>Cargando fechas…</div></div>`;
    getDates().then(ds=>{ window._allDates=ds.map(d=>d.fecha).sort((a,b)=>b.localeCompare(a)); renderCompararMob(); }).catch(()=>{ document.getElementById('tw').innerHTML=`<div class="mob-sec-title">Sin datos históricos</div>`; });
    return;
  }

  const formHtml=_compFormHtml();

  if(!S.comp.snapA||!S.comp.snapB){
    document.getElementById('tw').innerHTML=formHtml;
    return;
  }

  // Build results
  const {snapA,snapB,dateA,dateB}=S.comp;
  const rToday=S.rates;
  const catKeys=new Set(S.raw.filter(r=>r.source!=='historial').map(r=>(r.institucion||'')+'|'+(r.item||'')+'|'+(r.persona||'')));
  const currentCatMap={};
  S.raw.filter(r=>r.source!=='historial').forEach(r=>{ const k=(r.institucion||'')+'|'+(r.item||'')+'|'+(r.persona||''); if(!currentCatMap[k]) currentCatMap[k]=r.categoria; });
  function filterSnap2(snap){ return snap.filter(r=>catKeys.has((r.institucion||'')+'|'+(r.item||'')+'|'+(r.persona||''))); }
  function buildCatData2(snap){
    const filtered=filterSnap2(snap).map(r=>{ const k=(r.institucion||'')+'|'+(r.item||'')+'|'+(r.persona||''); const cc=currentCatMap[k]; return cc?{...r,categoria:cc}:r; });
    return aggregate(processRows(filtered,'todos',rToday,true));
  }
  const TA=buildCatData2(snapA), TB=buildCatData2(snapB);
  const dtA=new Date(dateA), dtB=new Date(dateB);
  const days=Math.max(1,(dtB-dtA)/864e5);
  const MESES_C=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  function lbl2(d){ const dt=new Date(d); return `${String(dt.getUTCDate()).padStart(2,'0')} ${MESES_C[dt.getUTCMonth()]} ${dt.getUTCFullYear()}`; }

  const unit=S.compUnit;
  const unitLbl=unit==='usd'?'USD M':unit==='uf'?'UF':'MM';
  function scale(clp){ if(unit==='usd') return clp/(rToday?.usd||1)/1e3; if(unit==='uf') return clp/(rToday?.uf||1); return clp/1e6; }
  function fv2(v){ const r2=Math.round(unit==='clp'?v:v*10)/10; return fi(r2); }

  function compCard(label, vA, vB, color, isBold){
    const d=vB-vA;
    const dAnual=vA!==0?(d/days*365)/Math.abs(vA)*100:null;
    const dCol=d>0?'#4ade80':d<0?'#f87171':'#8b949e';
    const dSign=d>0?'▲':d<0?'▼':'';
    const dFmt=unit==='clp'?fi(Math.round(Math.abs(d))):fi(Math.round(Math.abs(d)*10)/10);
    const dAnualStr=dAnual!==null?` · ${dAnual>=0?'+':''}${dAnual.toFixed(1)}% año`:'';
    const cardBg=isBold?`rgba(${color==='#4ade80'?'74,222,128':color==='#f0883e'?'240,136,62':'63,185,80'},.06)`:'transparent';
    return `<div class="mob-cres" style="border-left:3px solid ${color||'#30363d'};background:${cardBg}">
      <div class="mob-cres-hdr">
        <span class="mob-cres-lbl" style="color:${isBold?color:'#8b949e'}">${label}</span>
        <span class="mob-cres-pct" style="color:${dCol}">${dAnualStr}</span>
      </div>
      <div class="mob-cres-delta" style="color:${dCol}">${dSign} ${dFmt} <span class="mob-cres-unit">${unitLbl}</span></div>
      <div class="mob-cres-from">${fv2(vA)} <span class="mob-cres-arrow">→</span> ${fv2(vB)} ${unitLbl}</div>
    </div>`;
  }

  let patA=0, patB=0, totA=0, totB=0;
  CATS.forEach(cat=>{ const va=scale(TA.catClp[cat]||0), vb=scale(TB.catClp[cat]||0); totA+=va; totB+=vb; if(cat!=='Casa'&&cat!=='Créditos Hipotecarios'){ patA+=va; patB+=vb; } });

  const periodoStr=days<31?`${days} días`:`${Math.round(days/30.44)} meses`;
  let resultsHtml=`<div class="mob-cres-header">
    <span>${lbl2(dateA)}</span><span class="mob-cres-arrow">→</span><span>${lbl2(dateB)}</span>
    <span class="mob-cres-periodo">${periodoStr}</span>
  </div>`;

  resultsHtml+=compCard('Total Patrimonio Inv.',patA,patB,'#f0883e',true);
  CATS.forEach(cat=>{
    const va=scale(TA.catClp[cat]||0), vb=scale(TB.catClp[cat]||0);
    if(va===0&&vb===0) return;
    resultsHtml+=compCard(cat,va,vb,COLORS[cat]||'#666',false);
  });
  resultsHtml+=compCard('Total General',totA,totB,'#4ade80',true);

  document.getElementById('tw').innerHTML=formHtml+resultsHtml;
  // Restore selected dates in inputs
  setTimeout(()=>{
    const a=document.getElementById('mcompA'), b=document.getElementById('mcompB');
    if(a) a.value=S.comp.dateA||''; if(b) b.value=S.comp.dateB||'';
  },0);
}

async function runCompararMob(){
  const a=document.getElementById('mcompA')?.value, b=document.getElementById('mcompB')?.value;
  if(!a||!b) return;
  // Snap to nearest available date
  let dA=_snapDate(a), dB=_snapDate(b);
  if(dA===dB){ document.getElementById('tw').innerHTML=_compFormHtml()+`<div class="mob-comp-info" style="color:#f85149">Las fechas corresponden al mismo snapshot. Elige fechas distintas.</div>`; return; }
  if(dA>dB)[dA,dB]=[dB,dA];
  document.getElementById('tw').innerHTML=`<div class="sb"><div class="spin"></div><div>Cargando…</div></div>`;
  try{ await _loadComp(dA,dB); }
  catch(e){ document.getElementById('tw').innerHTML=`<div class="mob-sec-title" style="color:#f85149">Error: ${e.message}</div>`; }
}

// ─────────────────────────────────────────
// MOBILE: UNIT SELECTOR (summary chips)
// ─────────────────────────────────────────
function setMobUnit(u){
  S.mobUnit=u;
  if(isMob()&&(S.mainView==='summary'||S.mainView==='detail')) renderSummaryMob();
}

// ─────────────────────────────────────────
// MOBILE: ROUTING OVERRIDES
// NOTE: use variable reassignment (not function declarations) to avoid
// JS hoisting — function declarations with the same name get hoisted and
// the last one wins, so the "original" capture would grab itself → stack overflow.
// ─────────────────────────────────────────
const _renderCurrentDesktop = renderCurrent;
renderCurrent = function(){
  if(!isMob()){ _renderCurrentDesktop(); return; }
  mobUpdateNav();
  const v=S.mainView;
  if(v==='summary'||v==='detail') renderSummaryMob();
  else if(v==='caja'){
    if(S.subCaja==='activos') renderCajaMob();
    else if(S.subCaja==='cupos') renderCuposMob();
    else renderPagosMob();
  }
  else if(v==='comparar') renderCompararMob();
};

const _setCompUnitOrig = setCompUnit;
setCompUnit = function(u){
  S.compUnit=u;
  if(isMob()) renderCompararMob(); else renderComparar();
};

const _renderRatesOrig = renderRates;
renderRates = function(){
  _renderRatesOrig();
  const el=document.getElementById('mobRates');
  if(el) el.innerHTML=mobRatesHtml();
};

const _refreshOrig = refresh;
refresh = async function(){
  showLoad('Actualizando…');
  try{
    const [rates,data]=await Promise.all([getRates(),getSaldos()]);
    S.rates=rates; S.raw=data; S.date='actual';
    document.getElementById('dsel').value='actual';
    renderRates(); renderCurrent();
  }catch(e){showErr(e.message)}
};

// Handle resize (desktop ↔ mobile)
let _lastMob=isMob();
window.addEventListener('resize',()=>{
  const nowMob=isMob();
  if(nowMob!==_lastMob){ _lastMob=nowMob; renderCurrent(); }
});

init();
</script>
